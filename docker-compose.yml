version: '3.8'

services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=development
      - PORT=5000
      - MONGODB_URI=${MONGODB_URI:-mongodb://mongodb:27017/cloud-code-runner}
      - JWT_SECRET=${JWT_SECRET:-your_secret_key_change_this}
    depends_on:
      - mongodb
    volumes:
      - ./backend:/app/backend
    networks:
      - app-network
    command: node backend/server.js

  frontend:
    image: node:20-alpine
    working_dir: /app/frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:5000
    volumes:
      - ./frontend:/app/frontend
    command: sh -c "npm install && npm run dev"
    networks:
      - app-network

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    environment:
      - MONGO_INITDB_DATABASE=cloud-code-runner
    volumes:
      - mongodb_data:/data/db
    networks:
      - app-network

volumes:
  mongodb_data:

networks:
  app-network:
    driver: bridge
